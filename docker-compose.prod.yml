# Override pour production (VPS Hetzner).
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Différences vs dev :
# - Frontend en build optimisé (Next.js standalone)
# - Pas de volume mount du code (image figée)
# - Pas de --reload sur uvicorn
# - Postgres self-hosted (free, illimité ; auparavant Prisma cloud bloqué par plan)

services:
  redis:
    ports: []  # ne pas exposer redis sur l'host en prod

  postgres:
    # Expose seulement sur loopback (127.0.0.1) pour permettre `npx prisma db push`
    # depuis l'host. Pas accessible depuis l'extérieur (firewall + loopback only).
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes: []
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    volumes: []
    command: ["npm", "start"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}

  ml_worker:
    restart: unless-stopped
    volumes:
      - ./ml/artifacts:/app/artifacts
      - ./ml/data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      MODEL_DIR: /app/artifacts/models
      PER_LEAGUE_MODEL_LEAGUES: ${PER_LEAGUE_MODEL_LEAGUES:-Serie A}
      # Notifications Brevo
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      NOTIFICATION_EMAIL_TO: ${NOTIFICATION_EMAIL_TO:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://edgeai-betting.duckdns.org}
      VALUE_BET_LEAGUES: ${VALUE_BET_LEAGUES:-Ligue 1,Bundesliga,Serie A}
      VALUE_BET_OU_LEAGUES: ${VALUE_BET_OU_LEAGUES:-Premier League}
      VALUE_BET_AH_LEAGUES: ${VALUE_BET_AH_LEAGUES:-Ligue 1,Premier League,Serie A}
