# Override pour production (VPS Hetzner).
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Différences vs dev :
# - Frontend en build optimisé (Next.js standalone)
# - Pas de volume mount du code (image figée)
# - Pas de --reload sur uvicorn
# - Ports limités (seul backend:8000 et frontend:3000 exposés)
# - Postgres LOCAL désactivé (on utilise Prisma cloud via DATABASE_URL)

services:
  postgres:
    profiles: ["never"]  # désactive le postgres local

  redis:
    ports: []  # ne pas exposer redis sur l'host

  backend:
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes: []
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
    restart: unless-stopped
    volumes: []
    command: ["node", "server.js"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}

  ml_worker:
    restart: unless-stopped
    volumes:
      - ./ml/artifacts:/app/artifacts
      - ./ml/data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      ODDS_API_KEY: ${ODDS_API_KEY}
      MODEL_DIR: /app/artifacts/models
      PER_LEAGUE_MODEL_LEAGUES: ${PER_LEAGUE_MODEL_LEAGUES:-Serie A}
